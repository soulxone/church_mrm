{% extends "templates/web.html" %}

{% block page_content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">Membership Signup</h1>
    <p class="text-center text-muted mb-5">Join our church family. Fill out the form below and we will be in touch.</p>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form id="membership-form" class="card p-4">
                <div class="mb-3">
                    <label class="form-label">First Name *</label>
                    <input type="text" class="form-control" name="first_name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Name *</label>
                    <input type="text" class="form-control" name="last_name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" class="form-control" name="phone">
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Application</button>
            </form>
        </div>
    </div>
</div>
<script>
document.getElementById("membership-form").addEventListener("submit", function(e) {
    e.preventDefault();
    var form = e.target;
    frappe.call({
        method: "church_mrm.www.membership_signup.submit_signup",
        args: {
            first_name: form.first_name.value,
            last_name: form.last_name.value,
            email: form.email.value,
            phone: form.phone.value
        },
        callback: function(r) {
            if (r.message && r.message.status === "success") {
                frappe.msgprint("Thank you! Your membership application has been submitted. We will contact you soon.");
                form.reset();
            }
        }
    });
});
</script>
{% endblock %}
