{% extends "templates/web.html" %}

{% block page_content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">Make a Donation</h1>
    <p class="text-center text-muted mb-5">Thank you for your generous support of PS Church.</p>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form id="donate-form" class="card p-4">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="donor_name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Donation Type</label>
                    <select class="form-control" name="donation_type" required>
                        {% for dt in donation_types %}
                        <option value="{{ dt.name }}">{{ dt.label }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Amount ($)</label>
                    <input type="number" class="form-control" name="amount" min="1" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Donate Now</button>
            </form>
        </div>
    </div>
</div>
<script>
document.getElementById("donate-form").addEventListener("submit", function(e) {
    e.preventDefault();
    var form = e.target;
    frappe.call({
        method: "church_mrm.www.donate.submit_donation",
        args: {
            donor_name: form.donor_name.value,
            email: form.email.value,
            donation_type: form.donation_type.value,
            amount: form.amount.value
        },
        callback: function(r) {
            if (r.message && r.message.status === "success") {
                frappe.msgprint("Thank you for your donation!");
                form.reset();
            }
        }
    });
});
</script>
{% endblock %}
