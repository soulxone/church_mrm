<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3a9e8a"/>
      <stop offset="50%"  stop-color="#4ABFAB"/>
      <stop offset="100%" stop-color="#6BB8D4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#shine)"/>
  <!-- Steeple/Tower -->
  <polygon points="50,12 42,32 58,32" fill="white" opacity="0.95"/>
  <!-- Cross on top -->
  <rect x="48" y="8" width="4" height="14" rx="1" fill="white"/>
  <rect x="44" y="12" width="12" height="4" rx="1" fill="white"/>
  <!-- Tower body -->
  <rect x="42" y="32" width="16" height="22" rx="1" fill="white" opacity="0.95"/>
  <!-- Tower window (arch) -->
  <rect x="46" y="36" width="8" height="10" rx="4" fill="rgba(58,158,138,0.65)"/>
  <!-- Main church body left -->
  <rect x="20" y="44" width="22" height="32" rx="1" fill="white" opacity="0.9"/>
  <!-- Main church body right -->
  <rect x="58" y="44" width="22" height="32" rx="1" fill="white" opacity="0.9"/>
  <!-- Roof left -->
  <polygon points="18,44 31,30 42,44" fill="white" opacity="0.95"/>
  <!-- Roof right -->
  <polygon points="58,44 69,30 82,44" fill="white" opacity="0.95"/>
  <!-- Left windows -->
  <rect x="24" y="50" width="6" height="8" rx="3" fill="rgba(74,191,171,0.55)"/>
  <rect x="33" y="50" width="6" height="8" rx="3" fill="rgba(74,191,171,0.55)"/>
  <!-- Right windows -->
  <rect x="61" y="50" width="6" height="8" rx="3" fill="rgba(74,191,171,0.55)"/>
  <rect x="70" y="50" width="6" height="8" rx="3" fill="rgba(74,191,171,0.55)"/>
  <!-- Door -->
  <rect x="44" y="46" width="12" height="8" rx="6" fill="rgba(58,158,138,0.65)"/>
  <!-- Base/Foundation -->
  <rect x="16" y="76" width="68" height="6" rx="2" fill="white" opacity="0.85"/>
  <!-- People silhouettes -->
  <circle cx="30" cy="68" r="2.5" fill="white" opacity="0.7"/>
  <rect x="28" y="70" width="4" height="5" rx="2" fill="white" opacity="0.7"/>
  <circle cx="40" cy="66" r="2.5" fill="white" opacity="0.7"/>
  <rect x="38" y="68" width="4" height="7" rx="2" fill="white" opacity="0.7"/>
  <circle cx="50" cy="62" r="2.5" fill="white" opacity="0.7"/>
  <rect x="48" y="64" width="4" height="4" rx="2" fill="white" opacity="0.7"/>
  <circle cx="60" cy="66" r="2.5" fill="white" opacity="0.7"/>
  <rect x="58" y="68" width="4" height="7" rx="2" fill="white" opacity="0.7"/>
  <circle cx="70" cy="68" r="2.5" fill="white" opacity="0.7"/>
  <rect x="68" y="70" width="4" height="5" rx="2" fill="white" opacity="0.7"/>
  <!-- Heart in center (community love) -->
  <path d="M50,88 C50,88 42,83 42,79 C42,77 44,75 46,75 C48,75 50,77 50,77 C50,77 52,75 54,75 C56,75 58,77 58,79 C58,83 50,88 50,88Z" fill="white" opacity="0.8"/>
</svg>
